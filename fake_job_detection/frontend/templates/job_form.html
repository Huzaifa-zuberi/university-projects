<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check a Job — JobShield</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="{{ url_for('dashboard') }}" class="brand"><img src="{{ url_for('static', filename='assets/images/logo.png') }}" alt="Logo"><b>Job<span>Shield</span></b></a>
            <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('job_form') }}" class="active">Check Job</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('logout') }}" class="btn btn-primary">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="phead"><div class="wrap"><h1>Check a Job Posting</h1><p>Enter the details below and we'll check if it looks genuine.</p></div></div>

    <div class="wrap" style="padding: 34px 0;">
        <div class="panel">
            <div id="formError" class="flash" style="display:none;"></div>
            <form id="jobForm">
                <div class="group-label">Job Details</div>
                <div class="row2">
                    <div class="field"><label for="job_title">Job Title</label><input type="text" id="job_title" placeholder="e.g. Data Entry Officer" required></div>
                    <div class="field"><label for="company_name">Company Name</label><input type="text" id="company_name" placeholder="e.g. ABC Technologies"></div>
                </div>
                <div class="row2">
                    <div class="field"><label for="salary">Salary</label><input type="text" id="salary" placeholder="e.g. 50000 PKR / month"></div>
                    <div class="field"><label for="location">Location</label><input type="text" id="location" placeholder="e.g. Karachi"></div>
                </div>

                <div class="group-label">Requirements</div>
                <div class="row2">
                    <div class="field"><label for="employment_type">Employment Type</label>
                        <select id="employment_type"><option value="">Select</option><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option><option>Remote</option></select>
                    </div>
                    <div class="field"><label for="experience">Experience</label>
                        <select id="experience"><option value="">Select</option><option>No Experience</option><option>Entry Level</option><option>1-3 Years</option><option>3-5 Years</option><option>5+ Years</option></select>
                    </div>
                </div>
                <div class="field"><label for="education">Education</label>
                    <select id="education"><option value="">Select</option><option>Matric</option><option>Intermediate</option><option>Bachelor's</option><option>Master's</option><option>Any</option></select>
                </div>

                <div class="group-label">Description</div>
                <div class="field"><label for="description">Job Description</label><textarea id="description" placeholder="Paste the full job description here..." required></textarea></div>

                <button type="submit" class="btn btn-primary btn-block mt" id="submitBtn">Check This Job</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
